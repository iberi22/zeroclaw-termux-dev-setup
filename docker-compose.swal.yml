# =============================================================================
# ZeroClaw SWAL Agent — Docker Compose
# =============================================================================
# ZeroClaw como AGENTE-controlado por esta sesión de OpenClaw
# - Gateway HTTP API en puerto 42617
# - Workspace montado en proyectos SWAL
# - Habilitar TODAS las tools
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # ZeroClaw — Agente SWAL
  # --------------------------------------------------------------------------
  zeroclaw-swal:
    build:
      context: .
      dockerfile: Dockerfile.swal
    container_name: swal-zeroclaw-agent
    restart: unless-stopped
    env_file:
      - .env.swal

    environment:
      # ── ZeroClaw Core ──────────────────────────────────────────────────────
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_WORKSPACE=/zeroclaw-data/workspace
      - HOME=/zeroclaw-data

      # ── Tools — HABILITAR TODAS ────────────────────────────────────────────
      # Permitir ejecución de comandos shell
      - ZEROCLAW_ALLOW_SHELL=true
      # Permitir git operations
      - ZEROCLAW_ALLOW_GIT=true
      # Permitir acceso a archivos
      - ZEROCLAW_ALLOW_FILE_WRITE=true

      # ── SWAL Cortex ────────────────────────────────────────────────────────
      - CORTEX_URL=${CORTEX_URL:-http://host.docker.internal:8003}
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
      - SWAL_CORTEX_ENABLED=true

      # ── Logging ────────────────────────────────────────────────────────────
      - RUST_LOG=${RUST_LOG:-info,zeroclaw=debug}
      - RUST_BACKTRACE=1

    volumes:
      # Workspace = proyectos SWAL completos
      - swal-projects:/zeroclaw-data/workspace

      # Config persistente
      - swal-config:/zeroclaw-data/.zeroclaw

    ports:
      - "42617:42617"

    # Sin límites restrictivos — agente necesita recursos
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:42617/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - swal-net

  # --------------------------------------------------------------------------
  # Cortex Memory Server (si no está corriendo en host)
  # --------------------------------------------------------------------------
  cortex:
    image: ${CORTEX_IMAGE:-ghcr.io/iberi22/cortex:latest}
    container_name: swal-cortex
    restart: unless-stopped
    environment:
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
    ports:
      - "8003:8003"
    volumes:
      - cortex-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - swal-net
    profiles:
      - with-cortex

volumes:
  swal-projects:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Monte directo a proyectos — así el agente ve todos los proyectos
      device: ${PWD}/../

  swal-config:
    driver: local

  cortex-data:
    driver: local

networks:
  swal-net:
    driver: bridge
