# =============================================================================
# ZeroClaw SWAL Node — Docker Compose
# =============================================================================
# Uso:
#   docker compose -f docker-compose.swal.yml up -d
#   docker compose -f docker-compose.swal.yml logs -f
# =============================================================================

name: zeroclaw-swal

services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.swal
    container_name: zeroclaw-swal-node

    ports:
      - "42617:42617"   # Gateway HTTP
      - "2222:2222"     # SSH

    volumes:
      # Workspace compartido con host
      - type: bind
        source: ${HOME}/.openclaw/workspace
        target: /zeroclaw/workspace
        read_only: false

      # Skills de OpenClaw
      - type: bind
        source: ${HOME}/clawd/skills
        target: /zeroclaw/skills/openclaw
        read_only: true

      # Proyectos SWAL
      - type: bind
        source: ${HOME}/scripts-python
        target: /swal-projects
        read_only: true

      # SSH keys
      - type: bind
        source: ${HOME}/.ssh
        target: /zeroclaw/ssh
        read_only: true

      # Logs persistentes
      - type: volume
        source: zeroclaw-logs
        target: /zeroclaw/logs

      # Cortex (opcional)
      - type: volume
        source: cortex-data
        target: /cortex

    environment:
      - TERMUX_PKG=1
      - API_KEY=${API_KEY:-}
      - PROVIDER=${PROVIDER:-openrouter}
      - MODEL=${MODEL:-anthropic/claude-sonnet-4-20250514}
      - ZEROCLAW_WORKSPACE=/zeroclaw/workspace
      - ZEROCLAW_GATEWAY_PORT=42617
      - RUST_LOG=info
      - CARGO_BUILD_JOBS=4
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - zeroclaw-net

volumes:
  zeroclaw-logs:
  cortex-data:

networks:
  zeroclaw-net:
    driver: bridge
