# =============================================================================
# ZeroClaw SWAL Agent — Docker Compose
# =============================================================================
# ZeroClaw como AGENTE-controlado via HTTP API
# - Gateway HTTP API en puerto 42617
# - Workspace de OpenClaw migrado + proyectos SWAL
# - Todas las tools habilitadas
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # ZeroClaw — Agente SWAL
  # --------------------------------------------------------------------------
  zeroclaw-swal:
    image: swal-zeroclaw:latest
    container_name: swal-zeroclaw-agent
    restart: unless-stopped
    env_file:
      - .env.swal

    environment:
      # ── ZeroClaw Core ──────────────────────────────────────────────────────
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_WORKSPACE=/zeroclaw-data/workspace
      - HOME=/zeroclaw-data

      # ── Tools — TODAS HABILITADAS ─────────────────────────────────────────
      - ZEROCLAW_ALLOW_SHELL=true
      - ZEROCLAW_ALLOW_GIT=true
      - ZEROCLAW_ALLOW_FILE_WRITE=true
      - ZEROCLAW_ALLOW_FILE_DELETE=true

      # ── SWAL Cortex ────────────────────────────────────────────────────────
      - CORTEX_URL=${CORTEX_URL:-http://host.docker.internal:8003}
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
      - SWAL_CORTEX_ENABLED=true

      # ── Logging ────────────────────────────────────────────────────────────
      - RUST_LOG=${RUST_LOG:-info,zeroclaw=debug}
      - RUST_BACKTRACE=1

    volumes:
      # ── Workspace de ZeroClaw (migrado de OpenClaw) ──────────────────────
      # Aquí vive la memoria migrada, skills, config
      - swal-zeroclaw-data:/zeroclaw-data

      # ── Workspace original de OpenClaw (LECTURA) ──────────────────────────
      # Acceso de solo lectura al workspace actual de OpenClaw
      # para que ZeroClaw pueda leer AGENTS.md, SOUL.md, MEMORY.md, etc.
      - ${OPENCLAW_WORKSPACE:-C:/Users/belal/.openclaw/workspace}:/openclaw-workspace:ro

      # ── Proyectos SWAL (ESCRITURA) ────────────────────────────────────────
      # Proyectos en los que ZeroClaw puede trabajar
      - ${SWAL_PROJECTS_DIR:-C:/Users/belal/Projects}:/swal-projects:rw

    ports:
      - "${ZEROCLAW_GATEWAY_PORT:-42617}:42617"

    # Recursos — agente necesita memoria
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:42617/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - swal-net

  # --------------------------------------------------------------------------
  # Cortex Memory Server (solo si no corre en host)
  # --------------------------------------------------------------------------
  cortex:
    image: ${CORTEX_IMAGE:-ghcr.io/iberi22/cortex:latest}
    container_name: swal-cortex
    restart: unless-stopped
    environment:
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
    ports:
      - "8003:8003"
    volumes:
      - cortex-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - swal-net
    profiles:
      - with-cortex

volumes:
  swal-zeroclaw-data:
    driver: local
  cortex-data:
    driver: local

networks:
  swal-net:
    driver: bridge
