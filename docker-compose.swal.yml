# =============================================================================
# ZeroClaw SWARM Node — Docker Compose
# =============================================================================
# ZeroClaw comparte el WORKSPACE de OpenClaw directamente
# Ambos leen/escriben los mismos archivos de memoria e identidad
# =============================================================================

services:
  # ── Nodo ZeroClaw ──────────────────────────────────────────────────────────
  zeroclaw-node:
    image: zeroclaw-swan-node:latest
    container_name: ${NODE_NAME:-zeroclaw-swan-node}
    hostname: ${NODE_HOSTNAME:-swan-node}
    restart: unless-stopped

    env_file:
      - ./config/.env

    environment:
      # ── ZeroClaw ──────────────────────────────────────────────────────────
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}
      - ZEROCLAW_WORKSPACE=${OPENCLAW_WORKSPACE:-C:/Users/belal/.openclaw/workspace}
      - ZEROCLAW_CONFIG=/zeroclaw/config.toml

      # ── Autonomy ─────────────────────────────────────────────────────────
      - AUTONOMY_LEVEL=full

      # ── Cortex ───────────────────────────────────────────────────────────
      - CORTEX_ENABLED=${CORTEX_ENABLED:-true}
      - CORTEX_URL=${CORTEX_URL:-http://cortex:8003}
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}

      # ── SSH ─────────────────────────────────────────────────────────────
      - SSH_PORT=${SSH_PORT:-2222}

      # ── Logging ───────────────────────────────────────────────────────────
      - RUST_LOG=${RUST_LOG:-info,zeroclaw=debug}
      - RUST_BACKTRACE=1

    volumes:
      # ══════════════════════════════════════════════════════════════════════
      # WORKSPACE COMPARTIDO con OpenClaw
      # ══════════════════════════════════════════════════════════════════════
      # ZeroClaw y OpenClaw usan los MISMOS archivos de memoria e identidad
      # Ambos leen/escriben los mismos MEMORY.md, SOUL.md, AGENTS.md, etc.
      #
      # En Windows: path al workspace de OpenClaw
      # En Linux/Mac: ~/.openclaw/workspace
      # ─────────────────────────────────────────────────────────────────────
      - ${OPENCLAW_WORKSPACE:-C:/Users/belal/.openclaw/workspace}:/zeroclaw/workspace:rw

      # Skills de OpenClaw (~/clawd/skills)
      - ${OPENCLAW_SKILLS:-C:/Users/belal/clawd/skills}:/zeroclaw/skills/openclaw:ro

      # ══════════════════════════════════════════════════════════════════════
      # PROYECTOS de desarrollo (donde trabaja el agente)
      # ══════════════════════════════════════════════════════════════════════
      - ${SWAL_PROJECTS_DIR:-C:/Users/belal}:/swal-projects:rw

      # SSH keys del nodo
      - ./volumes/ssh:/zeroclaw/ssh

      # Logs del nodo
      - ./volumes/logs:/zeroclaw/logs

    ports:
      - "${ZEROCLAW_GATEWAY_PORT:-42617}:42617"
      - "${SSH_PORT:-2222}:2222"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:42617/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - swan-net

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Cortex Memory (interno) ───────────────────────────────────────────────
  cortex:
    image: ${CORTEX_IMAGE:-ghcr.io/iberi22/cortex:latest}
    container_name: ${NODE_NAME:-zeroclaw-swan-node}-cortex
    restart: unless-stopped
    environment:
      - CORTEX_TOKEN=${CORTEX_TOKEN:-dev-token}
    volumes:
      - ./volumes/cortex:/data
    ports:
      - "${CORTEX_PORT:-8003}:8003"
    networks:
      - swan-net
    profiles:
      - with-cortex

volumes:
  ssh:
  logs:
  cortex:

networks:
  swan-net:
    driver: bridge
