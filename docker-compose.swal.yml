# =============================================================================
# ZeroClaw SWAL Node — Docker Compose
# =============================================================================
# Uso:
#   docker compose -f docker-compose.swal.yml up -d
# =============================================================================

name: zeroclaw-swal

services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.swal
    container_name: zeroclaw-swan-node

    # Puertos
    ports:
      - "42617:42617"   # Gateway HTTP
      - "2222:2222"     # SSH

    # Compartir secrets del host (tokens API)
    env_file:
      - ${USERPROFILE}/.zeroclaw/secrets.env

    volumes:
      # Workspace compartido con OpenClaw (memorias live)
      - type: bind
        source: ${USERPROFILE}/.openclaw/workspace
        target: /zeroclaw/workspace
        read_only: false

      # Skills de OpenClaw
      - type: bind
        source: ${USERPROFILE}/clawd/skills
        target: /zeroclaw/skills/openclaw
        read_only: true

      # Proyectos SWAL
      - type: bind
        source: E:/scripts-python
        target: /swal-projects
        read_only: false

      # ZeroClaw config local
      - type: bind
        source: ${USERPROFILE}/.zeroclaw
        target: /home/agent/.zeroclaw
        read_only: false

      # Logs persistentes
      - type: volume
        source: zeroclaw-logs
        target: /zeroclaw/logs

      # Cortex (opcional)
      - type: volume
        source: cortex-data
        target: /cortex

    environment:
      - TERMUX_PKG=1
      - PROVIDER=${PROVIDER:-openrouter}
      - MODEL=${MODEL:-anthropic/claude-sonnet-4-20250514}
      - ZEROCLAW_WORKSPACE=/zeroclaw/workspace
      - ZEROCLAW_GATEWAY_PORT=42617
      - RUST_LOG=info
      - CARGO_BUILD_JOBS=4
      - ZEROCLAW_CONFIG=/home/agent/.zeroclaw/config.toml

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - zeroclaw-net

volumes:
  zeroclaw-logs:
  cortex-data:

networks:
  zeroclaw-net:
    driver: bridge
